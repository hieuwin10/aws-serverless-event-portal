  GetCategoriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EventApp-GetCategories
      Handler: handlers/getCategories.handler
      CodeUri: dist/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAppTable
      Events:
        GetCategories:
          Type: Api
          Properties:
            RestApiId: !Ref EventAppApi
            Path: /categories
            Method: GET
            Auth:
